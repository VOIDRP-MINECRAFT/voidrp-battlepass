name: Build

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Gradle build (with sibling deps)
    runs-on: ubuntu-latest
    steps:
      # build.gradle.kts compiles against ../voidrp_gamesync_plugin/build/libs/*.jar,
      # so recreate the sibling layout the local workspace has.
      - name: Checkout battlepass
        uses: actions/checkout@v4
        with:
          path: voidrp_battlepass

      - name: Checkout gamesync (compile dep)
        uses: actions/checkout@v4
        with:
          repository: VOIDRP-MINECRAFT/voidrp-gamesync-plugin
          path: voidrp_gamesync_plugin

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Neutralize local dev proxy (CI only)
        run: |
          for f in voidrp_battlepass/gradle.properties voidrp_gamesync_plugin/gradle.properties; do
            [ -f "$f" ] && sed -i '/[Pp]roxy/d' "$f" || true
          done

      - name: Build gamesync dep jar
        working-directory: voidrp_gamesync_plugin
        run: |
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon --stacktrace

      - name: Build battlepass
        working-directory: voidrp_battlepass
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon --stacktrace

      - name: Upload jars
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: 'voidrp_battlepass/**/build/libs/*.jar'
          if-no-files-found: warn
          retention-days: 14
