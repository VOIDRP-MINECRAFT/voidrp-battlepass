reset-hour: 0

season-name: "Сезон 2 - Эволюция"

# Даты сезона в формате yyyy-MM-dd
# Ключ хранилища данных привязан к season-start — при смене дат старые данные сохраняются отдельно (= сброс)
season-start: "2026-07-12"
season-end: "2026-10-12"

# Дневной лимит "гриндового" XP (мобы, сделки, достижения) на игрока.
# Квесты БП и дейлики его НЕ расходуют. 0 = без лимита.
daily-xp-cap: 8000

battlepass-npc-names:
  - "§6§lХранитель Сезона"

# Backend integration (оставь пустым если не используется)
backend-url: "https://api.void-rp.ru"
game-auth-secret: ""
# Опционально: slug сервера для мультисерверной атрибуции. Бэкенд также резолвит
# сервер по секрету, так что нужно только при общих шаблонах конфига. Пусто = сервер по умолчанию.
server-slug: ""

# WebGUI integration — открывать /bp через браузер в игре
webgui:
  enabled: false
  battlepass-url: "https://void-rp.ru/game-ui/battlepass"
